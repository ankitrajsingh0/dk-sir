<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
</head>

<body>

<button id="botton-id" type="button">clickme</button>
<p id="x">0</p>

<script>
let count = 0;
let counter = document.querySelector('#x');
let btn = document.getElementById("botton-id");

btn.addEventListener("click", function() {
    count = count + 1;
    counter.innerHTML = count;
});
</script>

</body>
</html>
